name: CMake

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            executable: CodeForge
            executable_path: build/bin/CodeForge
            archive: codeforge-linux-build-${{ github.run_number }}.tar.gz
          - os: windows-latest
            label: windows
            executable: CodeForge.exe
            executable_path: build/bin/Release/CodeForge.exe
            archive: codeforge-windows-build-${{ github.run_number }}.zip
            generator: Visual Studio 17 2022
          - os: macos-latest
            label: macos
            executable: CodeForge
            executable_path: build/bin/CodeForge
            archive: codeforge-macos-build-${{ github.run_number }}.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config libglfw3-dev libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libxxf86vm-dev

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "${{ matrix.generator }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package build (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "${{ matrix.executable_path }}" "dist/${{ matrix.executable }}"
          tar -czf "${{ matrix.archive }}" -C dist "${{ matrix.executable }}"

      - name: Package build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "${{ matrix.executable_path }}" "dist/${{ matrix.executable }}"
          Compress-Archive -Path "dist/${{ matrix.executable }}" -DestinationPath "${{ matrix.archive }}" -Force

      - name: Upload packaged build
        uses: actions/upload-artifact@v4
        with:
          name: codeforge-${{ matrix.label }}
          path: ${{ matrix.archive }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/codeforge-linux/*.tar.gz
            release-assets/codeforge-windows/*.zip
            release-assets/codeforge-macos/*.tar.gz
